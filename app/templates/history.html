{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">Workout History</h2>

<table class="table table-striped table-hover table-bordered align-middle">
    <thead class="table-light">
        <tr>
            <th>Date</th>
            <th>Exercise</th>
            <th>Sets</th>
            <th>Reps</th>
            <th>Weight</th>
        </tr>
    </thead>

    <tbody>
        {% for w in workouts %}
        <tr>
            <td>{{ w['date'] }}</td>
            <td>{{ w['exercise'] }}</td>
            <td>{{ w['sets'] }}</td>
            <td>{{ w['reps'] }}</td>
            <td>{{ w['weight'] }} kg</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
